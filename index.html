/* ---------------- Storage helpers (Firestore — real shared backend) ---------------- */
function showSaveToast(msg, isError){
  let el = document.getElementById("saveToast");
  if(!el){
    el = document.createElement("div");
    el.id = "saveToast";
    el.className = "save-toast";
    document.body.appendChild(el);
  }
  el.className = "save-toast" + (isError ? " error" : "");
  el.textContent = msg;
  el.style.display = "block";
  clearTimeout(el._hideTimer);
  el._hideTimer = setTimeout(() => { el.style.display = "none"; }, isError ? 6000 : 1500);
}

async function storageGet(key, shared){
  try{
    const doc = await db.collection("appdata").doc(key).get();
    if(!doc.exists) return null;
    return doc.data().value;
  }catch(e){
    console.error("storage get failed", e);
    showSaveToast("Couldn't load data: " + (e.code || e.message || "unknown error"), true);
    return null;
  }
}
async function storageSet(key, value, shared){
  try{
    await db.collection("appdata").doc(key).set({ value });
  }catch(e){
    console.error("storage set failed", e);
    showSaveToast("Couldn't save: " + (e.code || e.message || "unknown error"), true);
  }
}

async function loadUsers(){
  const raw = await storageGet("users", true);
  return raw ? JSON.parse(raw) : {};
}
async function saveUsers(users){
  await storageSet("users", JSON.stringify(users), true);
}
function pushNotification(targetUsername, notif){
  if(!targetUsername || targetUsername === ME.username) return;
  if(!state.users[targetUsername]){
    state.users[targetUsername] = { name: targetUsername, avatar: makeAvatar(targetUsername), bio: "", followers: [], following: [], notifications: [] };
  }
  if(!state.users[targetUsername].notifications) state.users[targetUsername].notifications = [];
  state.users[targetUsername].notifications.unshift({ ...notif, time: Date.now() });
  saveUsers(state.users);
}
function convKey(a, b){ return [a, b].sort().join("|"); }
async function loadMessages(key){
  const raw = await storageGet("dm:" + key, true);
  return raw ? JSON.parse(raw) : [];
}
async function saveMessagesArr(key, arr){
  await storageSet("dm:" + key, JSON.stringify(arr), true);
}
async function loadPosts(){
  const raw = await storageGet("posts", true);
  if(raw) return JSON.parse(raw);
  return [];
}
async function savePosts(posts){
  await storageSet("posts", JSON.stringify(posts), true);
}

/* ---------------- Helpers ---------------- */
function fmt(n){
  if(n>=1000) return (n/1000).toFixed(n%1000===0?0:1)+"k";
  return n;
}
function makeAvatar(name){
  const colors = ["#F58529","#DD2A7B","#8134AF","#515BD4","#3897f0","#fa7e1e","#5851DB"];
  let hash = 0;
  for(let i=0;i<name.length;i++) hash = (hash*31 + name.charCodeAt(i)) >>> 0;
  const color = colors[hash % colors.length];
  const letter = (name[0] || "?").toUpperCase();
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='150' height='150'><rect width='150' height='150' fill='${color}'/><text x='75' y='100' font-family='Arial, sans-serif' font-size='72' fill='white' text-anchor='middle'>${letter}</text></svg>`;
  return "data:image/svg+xml;utf8," + encodeURIComponent(svg);
}
function brokenImgFallback(){
  return `this.onerror=null;this.style.background='#e8e8e8';this.src='data:image/svg+xml;utf8,${encodeURIComponent("<svg xmlns='http://www.w3.org/2000/svg' width='150' height='150'><rect width='150' height='150' fill='%23e8e8e8'/></svg>")}';`;
}
const FALLBACK_IMG = "data:image/svg+xml;utf8," + encodeURIComponent("<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"150\" height=\"150\"><rect width=\"150\" height=\"150\" fill=\"#e8e8e8\"/></svg>");
function applyImageFallbacks(){
  document.querySelectorAll("img").forEach(img => {
    img.onerror = function(){
      this.onerror = null;
      this.style.background = "#e8e8e8";
      this.src = FALLBACK_IMG;
    };
  });
}
function initCarousels(){
  document.querySelectorAll("[data-carousel]").forEach(wrap => {
    const track = wrap.querySelector(".carousel-track");
    const counter = wrap.querySelector(".carousel-counter");
    const dots = wrap.querySelectorAll(".carousel-dots .dot");
    if(!track || dots.length === 0) return;
    track.onscroll = () => {
      const idx = Math.round(track.scrollLeft / track.clientWidth);
      if(counter) counter.textContent = `${idx + 1}/${dots.length}`;
      dots.forEach((d, i) => d.classList.toggle("active", i === idx));
    };
  });
}
function render(){
  const app = document.getElementById("app");
  const showNav = state.view !== "create" && state.view !== "auth" && state.view !== "loading";
  app.innerHTML = topbarHTML() + bodyHTML() + (showNav ? bottomnavHTML() : "")
    + (state.view==="create" ? createModalHTML() : "")
    + (showEditProfile ? editProfileModalHTML() : "")
    + (showAddStory ? addStoryModalHTML() : "")
    + (showViewStory ? viewStoryHTML() : "");

  applyImageFallbacks();
  initCarousels();
}

/* ---------------- Notifications ---------------- */
function timeAgo(ts){
  const diff = Math.max(0, Date.now() - ts);
  const mins = Math.floor(diff / 60000);
  if(mins < 1) return "now";
  if(mins < 60) return mins + "m";
  const hrs = Math.floor(mins / 60);
  if(hrs < 24) return hrs + "h";
  return Math.floor(hrs / 24) + "d";
}
function notifText(n){
  if(n.type === "like") return "liked your photo.";
  if(n.type === "comment") return `commented: "${(n.text||"").slice(0,40)}"`;
  if(n.type === "follow") return "started following you.";
  return "";
}

        <span>Add to story</span>
        <button class="modal-share" id="postStoryBtn" ${draftStoryImage ? "" : "disabled"}>Share</button>
      </div>
      <div class="upload-area" id="storyUploadArea">
        ${draftStoryImage ? `<img src="${draftStoryImage}" />` : `
          <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="#8e8e8e" stroke-width="1.4"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5-5 5-3-3-5 5"/></svg>
          <span style="font-size:13px;">Tap to select a photo</span>
        `}
      </div>
      ${urlPasteHTML("storyUrlInput", "storyUrlBtn")}
    </div>
  </div>`;
}

/* ---------------- Story viewer ---------------- */
function viewStoryHTML(){
  return `<div class="modal-overlay" id="storyViewOverlay" style="background:#000;">
    <div style="position:relative; width:100%; max-width:430px; height:100vh; display:flex; align-items:center; justify-content:center;">
      <img src="${myStory ? myStory.image : ''}" style="width:100%; max-height:100vh; object-fit:contain;" />
      <button id="closeStoryView" style="position:absolute; top:16px; right:16px; background:rgba(0,0,0,0.4); border:none; color:#fff; font-size:20px; width:34px;height:34px;border-radius:50%; cursor:pointer;">✕</button>
      <div style="position:absolute; top:16px; left:16px; display:flex; align-items:center; gap:8px;">
        <img src="${ME.avatar}" style="width:30px;height:30px;border-radius:50%;border:1.5px solid #fff;" />
        <span style="color:#fff;font-weight:600;font-size:13px;">${ME.username}</span>
      </div>
      <button id="removeStoryBtn" style="position:absolute; bottom:24px; background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.4); border-radius:8px; padding:8px 16px; font-size:13px; cursor:pointer;">Remove story</button>
    </div>
  </div>`;
}

/* ---------------- Events ---------------- */
function attachEvents(){
  document.querySelectorAll("[data-nav]").forEach(btn => {
    btn.onclick = () => {
      const target = btn.dataset.nav;
      if(target === "reels"){ return; } // not implemented in this demo
      if(target === "create"){ draftImages = []; draftCaption = ""; state.view = "create"; }
      else { viewingProfile = null; state.view = target; }
      render();
    };
  });

  // Search
  const searchInput = document.getElementById("searchInput");
  if(searchInput){
    searchInput.oninput = (e) => {
      searchQuery = e.target.value;
      render();
      const el = document.getElementById("searchInput");
      if(el){ el.focus(); el.selectionStart = el.selectionEnd = el.value.length; }
    };
  }
  const searchBackBtn = document.getElementById("searchBackBtn");
  if(searchBackBtn){ searchBackBtn.onclick = () => { state.view = "feed"; render(); }; }
  const profileBackBtn = document.getElementById("profileBackBtn");
  if(profileBackBtn){ profileBackBtn.onclick = () => { viewingProfile = null; state.view = cameFromView; render(); }; }

  document.querySelectorAll("[data-viewprofile]").forEach(el => {
    el.onclick = () => {
      const u = el.dataset.viewprofile;
      if(u === ME.username) return;
      cameFromView = state.view;
      viewingProfile = u;
      state.view = "profile";
      render();
    };
  });

  document.querySelectorAll("[data-explorepost]").forEach(el => {
    el.onclick = () => {
      const id = Number(el.dataset.explorepost);
      const p = state.posts.find(x => x.id === id);
      if(!p) return;
      cameFromView = state.view;
      viewingProfile = p.user === ME.username ? null : p.user;
      state.view = "profile";
      render();
    };
  });

  const followBtn = document.getElementById("followBtn");
  if(followBtn){
    followBtn.onclick = async () => {
      const target = followBtn.dataset.target;
      if(!state.users[ME.username]) state.users[ME.username] = { name: ME.name, avatar: ME.avatar, bio: state.profile.bio, followers: [], following: [] };
      if(!state.users[target]) state.users[target] = { name: target, avatar: makeAvatar(target), bio: "", followers: [], following: [] };
      const me = state.users[ME.username];
      const them = state.users[target];
      const idx = (me.following || []).indexOf(target);
      if(idx === -1){
        me.following = [...(me.following||[]), target];
        them.followers = [...(them.followers||[]), ME.username];
        pushNotification(target, { type: "follow", from: ME.username });
      } else {
        me.following.splice(idx, 1);
        them.followers = (them.followers||[]).filter(u => u !== ME.username);
      }
      render();
      await saveUsers(state.users);
    };
  }

  const notifBtn = document.getElementById("notifBtn");
  if(notifBtn){
    notifBtn.onclick = () => { cameFromView = state.view; state.view = "notifications"; render(); };
  }
  const notifBackBtn = document.getElementById("notifBackBtn");
  if(notifBackBtn){
    notifBackBtn.onclick = () => { state.view = cameFromView; render(); };
  }

  const dmBtn = document.getElementById("dmBtn");
  if(dmBtn){
    dmBtn.onclick = () => { cameFromView = state.view; state.view = "dm"; render(); };
  }
  const dmBackBtn = document.getElementById("dmBackBtn");
  if(dmBackBtn){
    dmBackBtn.onclick = () => { state.view = cameFromView; render(); };
  }

  const messageBtn = document.getElementById("messageBtn");
  if(messageBtn){
    messageBtn.onclick = () => openChat(messageBtn.dataset.target);
  }

  document.querySelectorAll("[data-openchat]").forEach(el => {
    el.onclick = () => openChat(el.dataset.openchat);
  });

  const chatBackBtn = document.getElementById("chatBackBtn");
  if(chatBackBtn){
    chatBackBtn.onclick = () => { state.view = "dm"; activeChatUser = null; render(); };
  }

  const chatInput = document.getElementById("chatInput");
  if(chatInput){
    chatInput.oninput = (e) => {
      chatDraft = e.target.value;
      document.getElementById("chatSendBtn").disabled = !chatDraft.trim();
    };
    chatInput.onkeydown = (e) => { if(e.key === "Enter" && chatDraft.trim()) sendChatMessage(); };
  }
  const chatSendBtn = document.getElementById("chatSendBtn");
  if(chatSendBtn){
    chatSendBtn.onclick = sendChatMessage;
  }
  const chatScroll = document.getElementById("chatScroll");
  if(chatScroll){ chatScroll.scrollTop = chatScroll.scrollHeight; }

  document.querySelectorAll("[data-like]").forEach(btn => {
    btn.onclick = () => {
      const id = Number(btn.dataset.like);
      const p = state.posts.find(x => x.id === id);
      if(!p.likedBy) p.likedBy = [];
      const i = p.likedBy.indexOf(ME.username);
      if(i === -1){
        p.likedBy.push(ME.username); p.likes += 1;
        pushNotification(p.user, { type: "like", from: ME.username, postImage: p.image });
      }
      else { p.likedBy.splice(i,1); p.likes -= 1; }
      render();
      savePosts(state.posts);
    };
  });

  document.querySelectorAll("[data-doubletap]").forEach(img => {
    let lastTap = 0;
    img.onclick = () => {
      const now = Date.now();
      if(now - lastTap < 350){
        const id = Number(img.dataset.doubletap);
        const p = state.posts.find(x => x.id === id);
        if(!p.likedBy) p.likedBy = [];
        if(!p.likedBy.includes(ME.username)){
          p.likedBy.push(ME.username); p.likes += 1;
          pushNotification(p.user, { type: "like", from: ME.username, postImage: p.image });
          render();
          savePosts(state.posts);
        }
      }
      lastTap = now;
    };
  });

  document.querySelectorAll("[data-save]").forEach(btn => {
    btn.onclick = () => {
      const id = Number(btn.dataset.save);
      const p = state.posts.find(x => x.id === id);
      p.saved = !p.saved;
      render();
    };
  });

  document.querySelectorAll("[data-commentinput]").forEach(input => {
    const id = Number(input.dataset.commentinput);
    const btn = document.querySelector(`[data-postcomment="${id}"]`);
    input.oninput = () => { btn.disabled = input.value.trim().length === 0; };
    input.onkeydown = (e) => { if(e.key === "Enter" && input.value.trim()) submitComment(id, input.value.trim()); };
  });

  document.querySelectorAll("[data-postcomment]").forEach(btn => {
    btn.onclick = () => {
      const id = Number(btn.dataset.postcomment);
      const input = document.querySelector(`[data-commentinput="${id}"]`);
      if(input.value.trim()) submitComment(id, input.value.trim());
    };
  });

  document.querySelectorAll("[data-focuscomment]").forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.focuscomment;
      document.querySelector(`[data-commentinput="${id}"]`).focus();
    };
  });

  document.querySelectorAll("[data-commentlike]").forEach(btn => {
    btn.onclick = () => {
      const [postId, idx] = btn.dataset.commentlike.split(":").map(Number);
      const p = state.posts.find(x => x.id === postId);
      if(!p) return;
      const c = p.comments[idx];
      if(!c.likes) c.likes = [];
      const i = c.likes.indexOf(ME.username);
      if(i === -1) c.likes.push(ME.username); else c.likes.splice(i, 1);
      render();
      savePosts(state.posts);
    };
  });

  document.querySelectorAll("[data-replytoggle]").forEach(el => {
    el.onclick = () => {
      const row = document.querySelector(`[data-replyrow="${el.dataset.replytoggle}"]`);
      if(!row) return;
      const showing = row.style.display === "block";
      row.style.display = showing ? "none" : "block";
      if(!showing){
        const input = row.querySelector("input");
        if(input) input.focus();
      }
    };
  });

  document.querySelectorAll("[data-replyinput]").forEach(input => {
    input.onkeydown = (e) => {
      if(e.key === "Enter" && input.value.trim()){
        submitReply(input.dataset.replyinput, input.value.trim());
      }
    };
  });

  // Create modal
  const overlay = document.getElementById("modalOverlay");
  if(overlay){
    document.getElementById("closeModal").onclick = () => { state.view = "feed"; render(); };
    const uploadArea = document.getElementById("uploadArea");
    if(uploadArea){
      uploadArea.onclick = () => {
        fileInputMode = "post";
        const fi = document.getElementById("fileInput");
        fi.setAttribute("multiple", "multiple");
        fi.click();
      };
    }
    const addMoreImg = document.getElementById("addMoreImg");
    if(addMoreImg){
      addMoreImg.onclick = () => {
        fileInputMode = "post";
        const fi = document.getElementById("fileInput");
        fi.setAttribute("multiple", "multiple");
        fi.click();
      };
    }
    document.querySelectorAll("[data-removeimg]").forEach(btn => {
      btn.onclick = () => { draftImages.splice(Number(btn.dataset.removeimg), 1); render(); };
    });
    document.getElementById("captionInput").oninput = (e) => { draftCaption = e.target.value; };
    document.getElementById("postUrlBtn").onclick = () => {
      const url = document.getElementById("postUrlInput").value.trim();
      if(url){ draftImages.push(url); document.getElementById("postUrlInput").value = ""; render(); }
    };
    document.getElementById("shareBtn").onclick = () => {
      if(!draftImages.length) return;
      const newPost = {
        id: Date.now(), user: ME.username, avatar: ME.avatar, location: "",
        image: draftImages[0], images: [...draftImages], caption: draftCaption || "", likes: 0, likedBy: [], saved: false,
        comments: [], time: "JUST NOW",
      };
      state.posts.unshift(newPost);
      state.view = "feed";
      draftImages = []; draftCaption = "";
      render();
      savePosts(state.posts);
    };
  }

  // Edit profile
  const editBtn = document.getElementById("editProfileBtn");
  if(editBtn){
    editBtn.onclick = () => {
      draftName = ME.name; draftBio = state.profile.bio; draftAvatar = ME.avatar;
      showEditProfile = true; render();
    };
  }
  const editOverlay = document.getElementById("editOverlay");
  if(editOverlay){
    document.getElementById("closeEditModal").onclick = () => { showEditProfile = false; render(); };
    document.getElementById("changePhotoBtn").onclick = () => { fileInputMode = "avatar"; document.getElementById("fileInput").click(); };
    document.getElementById("avatarUrlBtn").onclick = () => {
      const url = document.getElementById("avatarUrlInput").value.trim();
      if(url){ draftAvatar = url; render(); }
    };
    document.getElementById("editNameInput").oninput = (e) => {
      draftName = e.target.value;
      document.getElementById("saveProfileBtn").disabled = !draftName.trim();
    };
    document.getElementById("editBioInput").oninput = (e) => { draftBio = e.target.value; };
    document.getElementById("saveProfileBtn").onclick = saveProfileChanges;
  }

  // Add story
  const addStoryBtn = document.getElementById("addStoryBtn");
  if(addStoryBtn){
    addStoryBtn.onclick = (e) => {
      e.stopPropagation();
      draftStoryImage = null;
      showAddStory = true;
      render();
    };
  }
  const myStoryRing = document.getElementById("myStoryRing");
  if(myStoryRing && myStory){
    myStoryRing.style.cursor = "pointer";
    myStoryRing.onclick = () => { showViewStory = true; render(); };
  }
  const storyModalOverlay = document.getElementById("storyModalOverlay");
  if(storyModalOverlay){
    document.getElementById("closeStoryModal").onclick = () => { showAddStory = false; render(); };
    document.getElementById("storyUploadArea").onclick = () => { fileInputMode = "story"; document.getElementById("fileInput").click(); };
    document.getElementById("storyUrlBtn").onclick = () => {
      const url = document.getElementById("storyUrlInput").value.trim();
      if(url){ draftStoryImage = url; render(); }
    };
    document.getElementById("postStoryBtn").onclick = () => {
      if(!draftStoryImage) return;
      myStory = { image: draftStoryImage, time: Date.now() };
      showAddStory = false;
      draftStoryImage = null;
      render();
    };
  }
  const storyViewOverlay = document.getElementById("storyViewOverlay");
  if(storyViewOverlay){
    document.getElementById("closeStoryView").onclick = () => { showViewStory = false; render(); };
    document.getElementById("removeStoryBtn").onclick = () => { myStory = null; showViewStory = false; render(); };
  }

  // Auth screen
  const authSubmit = document.getElementById("authSubmit");
  if(authSubmit){
    const userEl = document.getElementById("userInput");
    const passEl = document.getElementById("passInput");
    const nameEl = document.getElementById("nameInput");
    userEl.oninput = (e) => { draftAuthUser = e.target.value; };
    passEl.oninput = (e) => { draftAuthPass = e.target.value; };
    if(nameEl) nameEl.oninput = (e) => { draftAuthName = e.target.value; };
    authSubmit.onclick = handleAuthSubmit;
    passEl.onkeydown = (e) => { if(e.key === "Enter"){ e.preventDefault(); handleAuthSubmit(); } };
  }
  const authSwitch = document.getElementById("authSwitch");
  if(authSwitch){
    authSwitch.onclick = () => { authMode = authMode === "signup" ? "login" : "signup"; authError = ""; render(); };
  }

  const logoutBtn = document.getElementById("logoutBtn");
  if(logoutBtn){
    logoutBtn.onclick = () => { ME = null; authMode = "login"; authError = ""; state.view = "auth"; render(); };
  }
}

async function saveProfileChanges(){
  if(!draftName.trim()) return;
  ME.name = draftName.trim();
  ME.avatar = draftAvatar;
  state.profile.bio = draftBio;

  const users = await loadUsers();
  if(users[ME.username]){
    users[ME.username].name = ME.name;
    users[ME.username].avatar = ME.avatar;
    users[ME.username].bio = draftBio;
    await saveUsers(users);
  }

  state.posts.forEach(p => { if(p.user === ME.username) p.avatar = ME.avatar; });
  await savePosts(state.posts);

  showEditProfile = false;
  state.view = "profile";
  render();
}

async function handleAuthSubmit(){
  const username = draftAuthUser.trim().toLowerCase();
  const password = draftAuthPass;
  const name = draftAuthName.trim();

  if(!username || !password){ authError = "Please fill in username and password."; render(); return; }

  const users = await loadUsers();

  if(authMode === "signup"){
    if(users[username]){ authError = "That username is already taken."; render(); return; }
    if(!name){ authError = "Please enter your full name."; render(); return; }
    users[username] = { password, name, avatar: makeAvatar(username), bio: "", followers: [], following: [] };
    await saveUsers(users);
    ME = { username, name, avatar: users[username].avatar };
    state.profile.bio = "";
  } else {
    const u = users[username];
    if(!u || u.password !== password){ authError = "Incorrect username or password."; render(); return; }
    if(!u.followers) u.followers = [];
    if(!u.following) u.following = [];
    ME = { username, name: u.name, avatar: u.avatar };
    state.profile.bio = u.bio || "";
  }

  state.users = users;
  authError = "";
  draftAuthUser = ""; draftAuthPass = ""; draftAuthName = "";
  state.view = "loading";
  render();
  state.posts = await loadPosts();
  state.view = "feed";
  render();
}

function readFileAsDataURL(file){
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}
document.getElementById("fileInput").addEventListener("change", async (e) => {
  const files = Array.from(e.target.files || []);
  if(!files.length) return;

  if(fileInputMode === "avatar"){
    draftAvatar = await readFileAsDataURL(files[0]);
  } else if(fileInputMode === "story"){
    draftStoryImage = await readFileAsDataURL(files[0]);
  } else {
    const results = await Promise.all(files.map(readFileAsDataURL));
    draftImages.push(...results);
  }
  render();
  e.target.value = "";
  e.target.removeAttribute("multiple");
});

function submitComment(id, text){
  const p = state.posts.find(x => x.id === id);
  p.comments.push({ user: ME.username, text, likes: [], replies: [] });
  pushNotification(p.user, { type: "comment", from: ME.username, text, postImage: p.image });
  render();
  savePosts(state.posts);
}

function submitReply(key, text){
  const [postId, idx] = key.split(":").map(Number);
  const p = state.posts.find(x => x.id === postId);
  if(!p) return;
  const c = p.comments[idx];
  if(!c.replies) c.replies = [];
  c.replies.push({ user: ME.username, text });
  pushNotification(c.user, { type: "comment", from: ME.username, text, postImage: p.image });
  render();
  savePosts(state.posts);
}

async function openChat(username){
  if(!username || username === ME.username) return;
  activeChatUser = username;
  chatDraft = "";
  chatLoading = true;
  cameFromView = state.view;
  state.view = "chat";
  render();
  chatMessages = await loadMessages(convKey(ME.username, username));
  chatLoading = false;
  render();
}

async function sendChatMessage(){
  const text = chatDraft.trim();
  if(!text || !activeChatUser) return;
  chatMessages.push({ from: ME.username, text, time: Date.now() });
  chatDraft = "";
  render();

  const key = convKey(ME.username, activeChatUser);
  await saveMessagesArr(key, chatMessages);

  if(!state.users[ME.username]) state.users[ME.username] = { name: ME.name, avatar: ME.avatar, bio: state.profile.bio, followers: [], following: [], dmThreads: [] };
  if(!state.users[activeChatUser]) state.users[activeChatUser] = { name: activeChatUser, avatar: makeAvatar(activeChatUser), bio: "", followers: [], following: [], dmThreads: [] };
  if(!state.users[ME.username].dmThreads) state.users[ME.username].dmThreads = [];
  if(!state.users[activeChatUser].dmThreads) state.users[activeChatUser].dmThreads = [];
  if(!state.users[ME.username].dmThreads.includes(activeChatUser)) state.users[ME.username].dmThreads.unshift(activeChatUser);
  if(!state.users[activeChatUser].dmThreads.includes(ME.username)) state.users[activeChatUser].dmThreads.unshift(ME.username);
  await saveUsers(state.users);
}

state.view = "auth";
render();
setTimeout(() => {
  if(window.__firestoreStartupError){
    const e = window.__firestoreStartupError;
    showSaveToast("Firestore not reachable: " + (e.code || e.message || "unknown error"), true);
  }
}, 1200);
